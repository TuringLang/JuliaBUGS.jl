name: Benchmark Comment

on:
  workflow_run:
    workflows: ["Benchmark"]
    types:
      - completed

permissions:
  pull-requests: write

jobs:
  comment:
    name: Post Benchmark Results
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Download benchmark results
        uses: actions/download-artifact@v4
        with:
          name: benchmark-results
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get PR number
        id: pr
        run: |
          PR_NUMBER=$(gh api \
            repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/artifacts \
            --jq '.artifacts[0].workflow_run.pull_requests[0].number' 2>/dev/null)
          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            # Fallback: search for PR by head SHA
            HEAD_SHA="${{ github.event.workflow_run.head_sha }}"
            PR_NUMBER=$(gh pr list --repo "${{ github.repository }}" --state open --json number,headRefOid \
              --jq ".[] | select(.headRefOid == \"$HEAD_SHA\") | .number")
          fi
          echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post results to PR
        if: steps.pr.outputs.number != ''
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          number: ${{ steps.pr.outputs.number }}
          path: benchmark_results.md
          recreate: true
