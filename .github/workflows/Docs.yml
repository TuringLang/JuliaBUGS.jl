name: Documentation

on:
  push:
    branches:
      - main
    tags: '*'
    paths:
      - 'JuliaBUGS/docs/**'
      - 'JuliaBUGS/src/**'
      - '.github/workflows/Docs.yml'
  pull_request:
    paths:
      - 'JuliaBUGS/docs/**'
      - 'JuliaBUGS/src/**'
      - '.github/workflows/Docs.yml'
  workflow_dispatch:

concurrency:
  # Skip intermediate builds: always.
  # Cancel intermediate builds: only if it is a pull request build.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

permissions:
  contents: write
  pull-requests: write

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Build and deploy Documenter.jl docs
        # Pinned to the sg/vitepress-support branch until that work is merged
        # to main; it adds a `use-vitepress: true` flag that switches the
        # deploy step from `Documenter.deploydocs` to
        # `DocumenterVitepress.deploydocs`, preserving the multi-base layout
        # (Vitepress bundles each version alias into its own subdir).
        uses: TuringLang/actions/DocsDocumenter@sg/vitepress-support
        with:
          pkg_path: JuliaBUGS
          doc-path: JuliaBUGS/docs
          doc-make-path: JuliaBUGS/docs/make.jl
          doc-build-path: JuliaBUGS/docs/build
          tag_prefix: "JuliaBUGS-"
          use-vitepress: 'true'
