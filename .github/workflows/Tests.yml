name: Tests

on:
  push:
    branches:
      - main
    paths:
      - 'JuliaBUGS/**'
      - '.github/workflows/Tests.yml'
  pull_request:
    paths:
      - 'JuliaBUGS/**'
      - '.github/workflows/Tests.yml'
  workflow_dispatch:

jobs:
  test:
    name: ${{ matrix.test_group }} - Julia ${{ matrix.version }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.version == 'pre' }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.11'
          - '1'
          # - 'min'
          # - 'pre'
        os:
          - ubuntu-latest
          # - windows-latest
        arch:
          - x64
        test_group:
          - "elementary"
          - "frontend"
          - "graphs"
          - "compilation"
          - "log_density"
          - "model_operations"
          - "callbacks"
          - "inference"
          - "gibbs"
          - "parallel_sampling"
          - "distributed_sampling"

    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.julia
            ~/.julia/artifacts
          key: ${{ runner.os }}-julia-${{ matrix.version }}-${{ matrix.arch }}-${{ hashFiles('JuliaBUGS/**/Project.toml', 'JuliaBUGS/**/Manifest.toml') }}
          restore-keys: |
            ${{ runner.os }}-julia-${{ matrix.version }}-${{ matrix.arch }}-
            ${{ runner.os }}-julia-${{ matrix.version }}-

      - uses: julia-actions/julia-buildpkg@v1
        with:
          project: JuliaBUGS

      - name: Set thread count
        if: matrix.test_group == 'parallel_sampling'
        id: threads
        run: echo "count=$(nproc)" >> $GITHUB_OUTPUT

      - name: Running ${{ matrix.test_group }} tests
        uses: julia-actions/julia-runtest@v1
        with:
          project: JuliaBUGS
        env:
          TEST_GROUP: ${{ matrix.test_group }}
          JULIA_NUM_THREADS: ${{ matrix.test_group == 'parallel_sampling' && steps.threads.outputs.count || '1' }}
