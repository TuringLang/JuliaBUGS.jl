version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "julia"
    directory: "/JuliaBUGS"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kolkata"
    groups:
      all-julia-packages:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/DoodleBUGS"
    schedule:
      interval: "weekly"
    groups:
      all-npm-packages:
        patterns:
          - "*"
